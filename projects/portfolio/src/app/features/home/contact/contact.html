<section id="contact" class="py-14">
  <h2 reveal class="rv text-xl font-bold tracking-tight mb-1 c-ink">Get in touch</h2>
  <p reveal class="rv text-sm mb-8 c-ink4">
    Open to full-time roles, contracts, and consulting. Let's build something great.
  </p>

  <div reveal class="rv d1 grid sm:grid-cols-2 gap-12">
    <div class="flex flex-col gap-5">
      <div>
        <div class="mono text-[10px] uppercase tracking-widest mb-1 c-ink5">Email</div>
        <a
          href="mailto:alex@angulardev.io"
          class="text-sm c-ink2 hover:text-[#E8334A]"
          style="transition: color 0.2s"
          >alex@angulardev.io</a
        >
      </div>
      <div>
        <div class="mono text-[10px] uppercase tracking-widest mb-1 c-ink5">Location</div>
        <div class="text-sm c-ink3">San Francisco · Open to remote worldwide</div>
      </div>
      <div>
        <div class="mono text-[10px] uppercase tracking-widest mb-1 c-ink5">Status</div>
        <div class="flex items-center gap-2 text-sm font-medium" style="color: #22c55e">
          <span class="w-2 h-2 bg-green-500 pg"></span>
          Available for immediate start
        </div>
      </div>
      <div class="flex gap-2 pt-2">
        <a href="#" class="c-btn mono text-[10px] uppercase tracking-widest px-4 py-2">LinkedIn</a>
        <a href="#" class="c-btn mono text-[10px] uppercase tracking-widest px-4 py-2">GitHub</a>
        <a href="#" class="c-btn mono text-[10px] uppercase tracking-widest px-4 py-2">CV ↓</a>
      </div>
    </div>
    <div class="flex flex-col gap-4">
      <div>
        <label class="mono text-[10px] tracking-widest uppercase block mb-2 c-ink5">Name</label>
        <input
          type="text"
          placeholder="Your name"
          class="c-input w-full px-4 py-2.5 text-sm font-light"
        />
      </div>
      <div>
        <label class="mono text-[10px] tracking-widest uppercase block mb-2 c-ink5">Email</label>
        <input
          type="email"
          placeholder="you@company.com"
          class="c-input w-full px-4 py-2.5 text-sm font-light"
        />
      </div>
      <div>
        <label class="mono text-[10px] tracking-widest uppercase block mb-2 c-ink5">Message</label>
        <textarea
          rows="4"
          placeholder="Tell me about your Angular project..."
          class="c-input w-full px-4 py-2.5 text-sm font-light resize-none"
        ></textarea>
      </div>
      <button
        class="mono text-[10px] tracking-widest uppercase text-white bg-[#E8334A] hover:bg-[#c42638] transition-colors py-2.5 w-full"
      >
        Send Message →
      </button>
    </div>
  </div>
</section>
